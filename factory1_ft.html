<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1공장 FT 일지</title>

    <!-- Supabase CDN 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 외부 스타일 및 아이콘 스타일 시트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/factory1_common_style.css">
    <link rel="stylesheet" href="css/factory1_ft_style.css">
    <link rel="stylesheet" href="css/factory1_ilji_style.css">

    <!-- 캘린더 라이브러리 및 한국어 팩 -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
</head>
<body data-initial-page="ft">
    <div class="f1-shell f1-shell--ft">
        <header class="f1-header">
            <!-- 공통 삼선 메뉴 및 제목 드롭다운 영역 -->
            <div class="f1-title-area">
                <button id="f1MenuBtn" class="f1-menu-btn" title="메뉴 열기" type="button">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <span id="f1MainTitle" class="f1-main-title clickable">1공장 FT 일지</span>

                <!-- 계층형 서브메뉴 구조 -->
                <div id="f1Dropdown" class="f1-dropdown-menu">
                    <div class="f1-dropdown-item has-submenu">
                        <div class="submenu-title-wrap">1공장 FT</div>
                        <span class="material-symbols-outlined submenu-arrow">chevron_right</span>
                        <div class="f1-submenu">
                            <a href="factory1_ft.html" data-page="ft" class="f1-dropdown-item active">FT 일지</a>
                            <a href="factory1_ft_io.html" data-page="ft_io" class="f1-dropdown-item">FT 재고 종합</a>
                        </div>
                    </div>
                    <a href="factory1_ilji.html" data-page="ilji" class="f1-dropdown-item">1공장 급지 일지</a>
                </div>
            </div>

            <!-- 공통 날짜 네비게이션 / 수정·저장·엑셀 버튼 -->
            <div class="f1-controls">
                <div class="f1-nav-group">
                    <button id="f1PrevBtn" class="f1-icon-btn" title="이전 날짜" type="button">
                        <span class="material-symbols-outlined">chevron_left</span>
                    </button>
                    <div class="f1-cal-wrap" id="f1CalendarWrap">
                        <span id="f1DateText" class="f1-date-text cursor-pointer"></span>
                        <input type="text" id="f1Flatpickr" class="f1-hidden-input" aria-hidden="true" tabindex="-1">
                    </div>
                    <button id="f1NextBtn" class="f1-icon-btn" title="다음 날짜" type="button">
                        <span class="material-symbols-outlined">chevron_right</span>
                    </button>
                </div>

                <button id="f1TodayBtn" class="f1-action-btn today-btn" type="button">오늘</button>
                <button id="f1EditBtn" class="f1-action-btn edit-btn" type="button" disabled>수정</button>
                <button id="f1SaveBtn" class="f1-action-btn save-btn" type="button" disabled>저장</button>
                <button id="f1ExcelBtn" class="f1-action-btn excel-btn" type="button" disabled>
                    <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 4px;">table_view</span>엑셀 출력
                </button>
            </div>
        </header>

        <!-- 비동기 공통 라우터에 의해 템플릿이 조립되는 루트 영역입니다 -->
        <div id="f1PageRoot"></div>
    </div>

    <!-- 스크립트 컴포넌트 순차적 로드 -->
    <script src="js/factory1_ft_constant.js"></script>
    <script src="js/factory1_ft_api.js"></script>
    <script src="js/factory1_ft_render.js"></script>
    <script src="js/factory1_ft_main.js"></script>

    <script src="js/factory1_ft_io_constant.js"></script>
    <script src="js/factory1_ft_io_api.js"></script>
    <script src="js/factory1_ft_io_render.js"></script>
    <script src="js/factory1_ft_io_main.js"></script>

    <script src="js/factory1_ilji_constant.js"></script>
    <script src="js/factory1_ilji_api.js"></script>
    <script src="js/factory1_ilji_render.js"></script>
    <script src="js/factory1_ilji_main.js"></script>

    <!-- 최종 라우팅 제어 공통 컨트롤러 -->
    <script src="js/factory1_common.js"></script>
</body>
</html>
